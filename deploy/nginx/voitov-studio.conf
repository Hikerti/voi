# Voitov Studio production Nginx configuration.
# Public VPS IPv4: 2.56.241.59
# Prisma Studio remains bound to 127.0.0.1:5555 and is proxied only through
# the current public IPv4. Remove or update this listen directive if the VPS IP changes.

server {
    listen 80;
    listen [::]:80;
    server_name voitov.ru www.voitov.ru;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Prisma Studio is exposed on the current public IPv4 only.
# Restrict this port with a firewall or remove this block when Studio is not needed.
server {
    listen 2.56.241.59:5555;
    server_name 2.56.241.59 _;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:5555;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
