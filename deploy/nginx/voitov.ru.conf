# Temporary IP-based Nginx config for Voitov Studio on VPS 46.173.17.61
#
# Proxies:
# - http://46.173.17.61/      -> Next.js frontend on 127.0.0.1:3000
# - http://46.173.17.61/api/  -> NestJS backend on 127.0.0.1:4000
# - http://46.173.17.61:5555/ -> Prisma Studio on 127.0.0.1:5555
#
# This config intentionally does not enable HTTPS because there is no domain yet.
# Prisma Studio is exposed on a separate port because Prisma Studio uses absolute
# /api/* requests internally, which conflict with the site's NestJS /api/* routes
# when Studio is mounted under a subpath like /prisma-studio/.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 46.173.17.61 _;

    client_max_body_size 20m;

    # SEO redirects from the technical specification.
    location = /index.php {
        return 301 /;
    }

    location = /index.html {
        return 301 /;
    }

    # Do not force trailing slashes while the project is served by IP.
    # Next.js handles route normalization, and forcing slashes here can create redirect loops.

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 80;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 80;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# Prisma Studio must be served from /, not from /prisma-studio/.
# Nginx listens only on the public VPS IPv4, while Prisma Studio stays bound to 127.0.0.1:5555.
server {
    listen 46.173.17.61:5555;
    server_name 46.173.17.61 _;

    client_max_body_size 20m;

    auth_basic "Prisma Studio";
    auth_basic_user_file /etc/nginx/.htpasswd-prisma;

    location / {
        proxy_pass http://127.0.0.1:5555;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 5555;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
