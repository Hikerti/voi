# Production Nginx config for Voitov Studio / voitov.ru
#
# Proxies:
# - https://www.voitov.ru/          -> Next.js frontend on 127.0.0.1:3000
# - https://www.voitov.ru/api/      -> NestJS backend on 127.0.0.1:4000
# - https://studio.voitov.ru/       -> Prisma Studio on 127.0.0.1:5555
#
# Requirements before enabling this file:
# 1. DNS A records for voitov.ru, www.voitov.ru and studio.voitov.ru must point to the VPS IP.
# 2. SSL certificates must exist for all three names in /etc/letsencrypt/live/www.voitov.ru/.
# 3. /etc/nginx/.htpasswd-prisma must exist for basic auth on Prisma Studio.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name voitov.ru www.voitov.ru studio.voitov.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    if ($host = voitov.ru) {
        return 301 https://www.voitov.ru$request_uri;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name voitov.ru;

    ssl_certificate /etc/letsencrypt/live/www.voitov.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.voitov.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.voitov.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.voitov.ru;

    ssl_certificate /etc/letsencrypt/live/www.voitov.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.voitov.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    # SEO redirects from the technical specification.
    location = /index.php {
        return 301 /;
    }

    location = /index.html {
        return 301 /;
    }

    # Redirect public page URLs without a trailing slash to the same URL with a slash.
    # Excludes API, Next.js internals, static assets and real files with extensions.
    rewrite ^/((?!api/|_next/|images/|fonts/|assets/|favicon.ico|robots.txt|sitemap.xml|.*\.[a-zA-Z0-9]+$).+[^/])$ /$1/ permanent;

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name studio.voitov.ru;

    ssl_certificate /etc/letsencrypt/live/www.voitov.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.voitov.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    auth_basic "Prisma Studio";
    auth_basic_user_file /etc/nginx/.htpasswd-prisma;

    location / {
        proxy_pass http://127.0.0.1:5555;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
