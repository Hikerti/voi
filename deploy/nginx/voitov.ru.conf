# Temporary IP-based Nginx config for Voitov Studio on VPS 46.173.17.61
#
# Proxies:
# - http://46.173.17.61/              -> Next.js frontend on 127.0.0.1:3000
# - http://46.173.17.61/api/          -> NestJS backend on 127.0.0.1:4000
# - http://46.173.17.61/prisma-studio/ -> Prisma Studio on 127.0.0.1:5555
#
# This config intentionally does not enable HTTPS because there is no domain yet.
# When a domain is connected, replace this file with a domain + SSL version.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 46.173.17.61 _;

    client_max_body_size 20m;

    # SEO redirects from the technical specification.
    location = /index.php {
        return 301 /;
    }

    location = /index.html {
        return 301 /;
    }

    # Redirect public page URLs without a trailing slash to the same URL with a slash.
    # Excludes API, Prisma Studio, Next.js internals, static assets and real files with extensions.
    rewrite ^/((?!api/|prisma-studio/|_next/|images/|fonts/|assets/|favicon.ico|robots.txt|sitemap.xml|.*\.[a-zA-Z0-9]+$).+[^/])$ /$1/ permanent;

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 80;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Prisma Studio is exposed under /prisma-studio/ while there is no domain.
    # Keep basic auth enabled because Prisma Studio must not be public without a password.
    location /prisma-studio/ {
        auth_basic "Prisma Studio";
        auth_basic_user_file /etc/nginx/.htpasswd-prisma;

        rewrite ^/prisma-studio/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:5555;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 80;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 80;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
